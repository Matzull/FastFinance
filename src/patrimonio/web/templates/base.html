        function appSettings() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                language: localStorage.getItem('language') || 'en',
                
                init() {
                    window.translations = translations;
                    window.t = (key) => this.t(key);
                    window.currentLang = this.language;
                    this.$watch('darkMode', val => localStorage.setItem('darkMode', val));
                    this.$watch('language', val => {
                        localStorage.setItem('language', val);
                        document.documentElement.lang = val;
                        window.currentLang = val;
                    });
                },
                
                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                },
                
                toggleLanguage() {
                    this.language = this.language === 'es' ? 'en' : 'es';
                },
                
                t(key) {
                    return translations[this.language]?.[key] || translations['en'][key] || key;
                }
            }
        }
        
        // Función global para acceder a traducciones desde otros componentes
        function getTranslation(key, lang) {
            const currentLang = lang || localStorage.getItem('language') || 'en';
            return translations[currentLang]?.[key] || translations['en'][key] || key;
        }

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors duration-200">
    <!-- Navegación -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="flex items-center space-x-2 text-white">
                    <i class="fas fa-wallet text-2xl"></i>
                    <span class="font-bold text-xl">Patrimonio</span>
                </a>
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-white hover:text-gray-200 transition {% if active_page == 'dashboard' %}border-b-2 border-white{% endif %}">
                        <i class="fas fa-chart-pie mr-1"></i> <span x-text="t('dashboard')">Dashboard</span>
                    </a>
                    <a href="/bancos" class="text-white hover:text-gray-200 transition {% if active_page == 'bancos' %}border-b-2 border-white{% endif %}">
                        <i class="fas fa-university mr-1"></i> <span x-text="t('banks')">Bancos</span>
                    </a>
                    <a href="/transacciones" class="text-white hover:text-gray-200 transition {% if active_page == 'transacciones' %}border-b-2 border-white{% endif %}">
                        <i class="fas fa-exchange-alt mr-1"></i> <span x-text="t('transactions')">Transacciones</span>
                    </a>
                    <a href="/suscripciones" class="text-white hover:text-gray-200 transition {% if active_page == 'suscripciones' %}border-b-2 border-white{% endif %}">
                        <i class="fas fa-sync-alt mr-1"></i> <span x-text="t('subscriptions')">Suscripciones</span>
                    </a>
                    <a href="/presupuestos" class="text-white hover:text-gray-200 transition {% if active_page == 'presupuestos' %}border-b-2 border-white{% endif %}">
                        <i class="fas fa-bullseye mr-1"></i> <span x-text="t('budgets')">Presupuestos</span>
                    </a>
                    <a href="/insights" class="text-white hover:text-gray-200 transition {% if active_page == 'insights' %}border-b-2 border-white{% endif %}">
                        <i class="fas fa-lightbulb mr-1"></i> <span x-text="t('insights')">Insights</span>
                    </a>
                    
                    <!-- Separador -->
                    <div class="border-l border-white/30 h-6"></div>
                    
                    <!-- Selector de idioma -->
                    <button @click="toggleLanguage()" class="text-white hover:text-gray-200 transition flex items-center" :title="t('language')">
                        <i class="fas fa-globe mr-1"></i>
                        <span x-text="language.toUpperCase()" class="text-sm font-medium"></span>
                    </button>
                    
                    <!-- Toggle modo oscuro -->
                    <button @click="toggleDarkMode()" class="text-white hover:text-gray-200 transition" :title="darkMode ? t('lightMode') : t('darkMode')">
                        <i :class="darkMode ? 'fas fa-sun' : 'fas fa-moon'" class="text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-4 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p x-text="t('footer')">© 2026 Patrimonio - Gestor de Finanzas Personales</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
